<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Test Page</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    .container {
      max-width: 800px;
      margin: 40px auto;
      font-family: Arial, sans-serif;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      box-sizing: border-box;
    }
    .counter {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    button {
      padding: 8px 16px;
      cursor: pointer;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <h1>{{ title }}</h1>

      <div class="card">
        <label>نام:</label>
        <input
          v-model="name"
          placeholder="نام خود را وارد کنید"
        />

        <p>سلام {{ name || "کاربر" }} 👋</p>

        <hr />

        <h3>Counter</h3>

        <div class="counter">
          <button @click="decrement">-</button>
          <span>{{ count }}</span>
          <button @click="increment">+</button>
        </div>

        <hr />

        <button @click="loadData">
          دریافت اطلاعات
        </button>

        <div v-if="loading">
          در حال بارگذاری...
        </div>

        <ul v-else>
          <li
            v-for="item in users"
            :key="item.id"
          >
            {{ item.name }}
          </li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const title = "Vue Test Page";
        const name = ref("");
        const count = ref(0);
        const loading = ref(false);
        const users = ref([]);

        const increment = () => count.value++;
        const decrement = () => count.value--;

        const loadData = async () => {
          loading.value = true;
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/users"
          );
          users.value = await response.json();
          loading.value = false;
        };

        return {
          title,
          name,
          count,
          loading,
          users,
          increment,
          decrement,
          loadData
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
